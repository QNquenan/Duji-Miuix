name: Build Android APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-37.0" "build-tools;37.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Restore Android signing key
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::Missing ANDROID_KEYSTORE_BASE64 repository secret"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/duji.keystore"

      - name: Build APK
        run: ./gradlew --no-daemon assembleDebug assembleRelease
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/duji.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DuJi-apk
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: Prepare release notes
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python3 - "$RELEASE_TAG" <<'PY'
          import json
          import sys
          from pathlib import Path

          release_tag = sys.argv[1]
          notes_path = Path("app/src/main/assets/release_notes.json")
          notes = json.loads(notes_path.read_text(encoding="utf-8"))
          release = next((item for item in notes if item.get("title") == release_tag), None)

          if release is None:
              available = ", ".join(item.get("title", "") for item in notes)
              raise SystemExit(
                  f"No release notes found for {release_tag}. Available versions: {available}"
              )

          lines = [f"## {release_tag}", ""]
          lines.extend(f"- {item}" for item in release.get("items", []))
          Path("release-notes.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          generate_release_notes: false
          files: app/build/outputs/apk/**/*.apk
